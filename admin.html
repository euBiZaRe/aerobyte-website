<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AeroByte: Protected Administrator Page">
    <title>AeroByte Premium | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=5.0">
</head>
<body class="saas-body">
    <div class="admin-layout">
        <!-- SaaS Sidebar -->
        <aside class="saas-sidebar">
            <div class="sidebar-logo" style="margin-bottom: 40px; padding: 0 10px;">
                <a href="index.html" class="logo" style="font-size: 1.2rem;">AeroByte<span class="accent" style="color: var(--accent);">.shop</span></a>
                <p style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;">Admin Terminal</p>
            </div>

            <nav class="saas-nav">
                <div class="saas-nav-item"><i class="fas fa-th-large"></i> Dashboard</div>
                <div class="saas-nav-item active"><i class="fas fa-users"></i> User Database</div>
                <div class="saas-nav-item"><i class="fas fa-key"></i> License Keys</div>
                <div class="saas-nav-item"><i class="fas fa-history"></i> Activity Logs</div>
                <div class="saas-nav-item"><i class="fas fa-cog"></i> Platform Settings</div>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <div class="sidebar-label" style="font-size: 0.6rem; margin-bottom: 15px;">Admin Utilities</div>
                <button id="resyncDashboard" class="saas-manage-btn" style="width: 100%; justify-content: center; margin-bottom: 10px;">
                    <i class="fas fa-sync-alt"></i> Force Resync
                </button>
                <div style="font-size: 0.65rem; color: var(--text-muted); text-align: center; opacity: 0.5;">
                    v5.0 Stable Release
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="saas-main">
            <header class="saas-header">
                <div class="saas-search-container">
                    <i class="fas fa-search" style="color: var(--text-muted); font-size: 0.8rem;"></i>
                    <input type="text" id="userSearch" placeholder="Search members by name or email...">
                </div>

                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="saas-manage-btn" style="border: 1px solid var(--accent); color: var(--accent); background: rgba(59, 130, 246, 0.05);">
                        <i class="fas fa-plus"></i> Add User
                    </div>
                    <div style="width: 1px; height: 30px; background: var(--border-color);"></div>
                    <div class="admin-profile-pill" style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                        <div style="text-align: right;">
                            <p id="adminDisplayName" style="font-size: 0.85rem; font-weight: 700; color: #fff;">Administrator</p>
                            <p style="font-size: 0.7rem; color: var(--text-muted);">Root Access</p>
                        </div>
                        <div class="saas-avatar" style="width: 36px; height: 36px; background: var(--gradient-saas); font-size: 0.9rem;">A</div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div id="saasDashboard">
                <div class="saas-content-header">
                    <div>
                        <h1 style="font-size: 1.8rem; margin: 0;">Member <span class="gradient-text" style="background: var(--gradient-saas); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Database</span></h1>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Manage platform licenses, HWID resets, and user status.</p>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="saas-pill saas-pill-blue"><i class="fas fa-circle" style="font-size: 0.4rem;"></i> Premium Storage</div>
                        <div class="saas-pill saas-pill-purple"><i class="fas fa-shield-alt" style="font-size: 0.7rem;"></i> Encrypted Access</div>
                    </div>
                </div>

                <!-- User Grid Container (Will be populated by JS) -->
                <div id="adminUsersTbody" class="saas-card-container">
                    <!-- Skeleton states will show here during load -->
                    <div class="saas-user-row saas-skeleton" style="height: 80px;"></div>
                    <div class="saas-user-row saas-skeleton" style="height: 80px;"></div>
                    <div class="saas-user-row saas-skeleton" style="height: 80px;"></div>
                    <div class="saas-user-row saas-skeleton" style="height: 80px;"></div>
                </div>
            </div>

            <!-- Promotion Generator (Floating or Tabbed Section) -->
            <section id="promoTools" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 40px; display:none;">
                <!-- Existing Promo logic will be integrated here or in a separate tab -->
            </section>
        </main>
    </div>

    <!-- The original Sidebar Content (Migrated to hidden storage for JS access if needed or refactored) -->
    <div id="legacySidebarData" style="display:none;">
        <!-- Placeholder for existing inputs we need for script-v1.js logic -->
        <input type="checkbox" id="promoLifetime">
        <select id="promoProduct"><option value="RL Bot Trainer"></option></select>
        <input type="number" id="promoDays" value="30">
        <input type="number" id="promoHours" value="0">
        <input type="number" id="promoMins" value="0">
        <select id="directProduct"></select>
    </div>

    <script type="module" src="script-v1.js?v=5.2"></script>
</body>
</html>
